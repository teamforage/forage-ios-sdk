name: Generate and Publish Jazzy Docs

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_version:
        description: 'The release version to publish docs for'
        required: true
        type: string

jobs:
  build:
    runs-on: macOS-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3.0'

      - name: Install Jazzy
        run: sudo gem install jazzy

      - name: Generate Docs with Jazzy
        run: jazzy --module_version=${{ github.event.release.tag_name || inputs.release_version }}

      - name: Upload documentation as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jazzy-docs
          path: reference-docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Netlify
        run: npm install netlify-cli@23 -g

      - name: Download docs artifact
        uses: actions/download-artifact@v5
        with:
          name: jazzy-docs
          path: reference-docs

      - name: Deploy to Netlify
        run: netlify deploy --prod --dir reference-docs --site ${{ secrets.NETLIFY_SITE_ID }} --auth ${{ secrets.NETLIFY_API_TOKEN }}
